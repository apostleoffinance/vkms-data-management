# Render blueprint (optional). You can also create the service manually in the dashboard.
# Docs: deploy/DEPLOYMENT-CLOUD.md

services:
  - type: web
    name: vkms-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: DEBUG
        value: "false"
      - key: RATE_LIMIT
        value: "100/minute"
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@votagekids.org
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
