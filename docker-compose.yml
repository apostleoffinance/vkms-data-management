services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vkms
      POSTGRES_PASSWORD: vkms_secret
      POSTGRES_DB: vkms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Internal only — avoids conflict with local PostgreSQL on host port 5432.
    # Shell access: docker compose exec postgres psql -U vkms -d vkms_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vkms -d vkms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://vkms:vkms_secret@postgres:5432/vkms_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-long-random-string}
      CORS_ORIGINS: http://localhost:3000
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@votagekids.org
      PGADMIN_DEFAULT_PASSWORD: Admin123!
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
